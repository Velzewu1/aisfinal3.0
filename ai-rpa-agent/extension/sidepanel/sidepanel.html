<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Акбобек AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ---------- Design tokens — business-minimal medical UI ---------- */
      :root {
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-muted: #f1f3f6;
        --border: #e3e6eb;
        --border-strong: #d4d9e0;
        --accent: #2f6bff;
        --accent-soft: rgba(47, 107, 255, 0.08);
        --accent-strong: rgba(47, 107, 255, 0.16);
        --accent-hover: #1d57e6;
        --success: #16a36b;
        --success-soft: rgba(22, 163, 107, 0.1);
        --warning: #c07400;
        --warning-soft: rgba(192, 116, 0, 0.1);
        --error: #c82b3d;
        --error-soft: rgba(200, 43, 61, 0.08);
        --text: #0f172a;
        --text-secondary: #5a6473;
        --text-muted: #8a94a3;
        --radius-sm: 6px;
        --radius: 8px;
        --radius-lg: 10px;
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        min-width: 320px;
        max-width: 420px;
        width: 100%;
        margin: 0 auto;
      }

      .app {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        padding: 14px 14px 14px;
        gap: 12px;
      }

      /* ======================================================
         1. HEADER — compact context bar
         ====================================================== */
      .header {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }

      .header-main {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .header-patient {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.005em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .header-patient .placeholder {
        color: var(--text-muted);
        font-weight: 450;
      }

      .header-context {
        font-size: 11px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .header-context-doc {
        color: var(--text);
        font-weight: 500;
      }

      .header-status {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px 8px 3px 7px;
        border-radius: 999px;
        background: var(--surface-muted);
        font-size: 10.5px;
        color: var(--text-secondary);
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--success);
        transition: background 200ms var(--ease);
      }

      .header-status[data-state="idle"] .status-dot {
        background: var(--success);
      }
      .header-status[data-state="recording"] .status-dot {
        background: var(--error);
        animation: dot-pulse 1.2s var(--ease) infinite;
      }
      .header-status[data-state="processing"] .status-dot {
        background: var(--accent);
        animation: dot-pulse 1.2s var(--ease) infinite;
      }
      .header-status[data-state="verify"] .status-dot {
        background: var(--warning);
      }
      .header-status[data-state="error"] .status-dot {
        background: var(--error);
      }

      @keyframes dot-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.55;
          transform: scale(0.85);
        }
      }

      /* ======================================================
         2. COMMAND BLOCK — mic + input, single row
         ====================================================== */
      .command-block {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 8px 8px 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        transition: border-color 180ms var(--ease), box-shadow 180ms var(--ease);
      }

      .command-block:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      .command-block[data-state="recording"] {
        border-color: var(--error);
        box-shadow: 0 0 0 3px var(--error-soft);
      }

      .command-block[data-state="processing"] {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      #record {
        position: relative;
        width: 44px;
        height: 44px;
        flex-shrink: 0;
        border-radius: 50%;
        border: none;
        padding: 0;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        display: grid;
        place-items: center;
        transition: background 180ms var(--ease), transform 120ms var(--ease),
          box-shadow 180ms var(--ease);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      }

      #record:hover {
        background: var(--accent-hover);
      }

      #record:active {
        transform: scale(0.96);
      }

      #record:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      #record.is-listening {
        background: var(--error);
        box-shadow: 0 0 0 4px var(--error-soft);
        animation: mic-breathe 1.8s var(--ease) infinite;
      }

      #record.is-processing {
        background: var(--accent);
      }

      @keyframes mic-breathe {
        0%,
        100% {
          box-shadow: 0 0 0 4px var(--error-soft);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(200, 43, 61, 0.05);
        }
      }

      #record .icon {
        position: absolute;
        transition: opacity 160ms var(--ease), transform 160ms var(--ease);
      }

      #record .icon-wave,
      #record .icon-spin {
        opacity: 0;
        transform: scale(0.8);
      }

      #record.is-listening .icon-mic {
        opacity: 0;
        transform: scale(0.8);
      }

      #record.is-listening .icon-wave {
        opacity: 1;
        transform: scale(1);
      }

      #record.is-processing .icon-mic {
        opacity: 0;
        transform: scale(0.8);
      }

      #record.is-processing .icon-spin {
        opacity: 1;
        transform: scale(1);
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: scale(1) rotate(360deg);
        }
      }

      .command-input-wrap {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #utter {
        flex: 1;
        min-width: 0;
        border: none;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 13px;
        padding: 8px 4px 8px 2px;
        outline: none;
      }

      #utter::placeholder {
        color: var(--text-muted);
        font-weight: 450;
      }

      .command-hint {
        flex-shrink: 0;
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 0 8px 0 6px;
        border-left: 1px solid var(--border);
        white-space: nowrap;
      }

      .command-hint .kbd {
        display: inline-block;
        padding: 1px 5px;
        font-size: 9.5px;
        background: var(--surface-muted);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text-secondary);
        font-family: inherit;
        margin-right: 3px;
      }

      /* ======================================================
         3. MAIN PANE — single state-driven container
         ====================================================== */
      .main-pane {
        flex: 1;
        min-height: 220px;
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .pane-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px 8px;
        border-bottom: 1px solid var(--border);
      }

      .pane-title {
        font-size: 10.5px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 0;
      }

      .pane-meta {
        font-size: 10.5px;
        color: var(--text-muted);
      }

      .pane-body {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 10px 12px 12px;
        scrollbar-width: thin;
        scrollbar-color: var(--border-strong) transparent;
      }

      .pane-body::-webkit-scrollbar {
        width: 6px;
      }

      .pane-body::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 4px;
      }

      /* --- State: idle --- */
      .pane-idle {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: stretch;
      }

      .pane-idle-hint {
        text-align: center;
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 1.55;
        padding: 6px 4px 4px;
      }

      .pane-idle-hint strong {
        color: var(--text);
        font-weight: 600;
      }

      .quick-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 4px;
      }

      .quick-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--text-secondary);
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 160ms var(--ease), color 160ms var(--ease),
          background 160ms var(--ease);
        font-family: inherit;
      }

      .quick-chip:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-soft);
      }

      .quick-chip:active {
        transform: scale(0.98);
      }

      /* --- State: processing (events) --- */
      .pane-events {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .event-row {
        display: grid;
        grid-template-columns: 8px 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 7px 2px 7px 2px;
        border-bottom: 1px solid var(--border);
        animation: fade-up 180ms var(--ease);
      }

      .event-row:last-child {
        border-bottom: none;
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .event-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-muted);
      }

      .event-dot.success {
        background: var(--success);
      }
      .event-dot.info {
        background: var(--accent);
      }
      .event-dot.warning {
        background: var(--warning);
      }
      .event-dot.error {
        background: var(--error);
      }

      .event-body {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .event-title {
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        line-height: 1.3;
      }

      .event-desc {
        font-size: 11px;
        color: var(--text-secondary);
        line-height: 1.35;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .event-time {
        font-size: 10px;
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
      }

      /* --- State: verify --- */
      .pane-verify {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .verify-summary {
        font-size: 12.5px;
        color: var(--text);
        line-height: 1.5;
        margin: 0;
      }

      .verify-summary strong {
        font-weight: 600;
      }

      .verify-fields {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .verify-field {
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface-muted);
      }

      .verify-field-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 3px;
      }

      .verify-field-value {
        font-size: 12.5px;
        color: var(--text);
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 80px;
        overflow-y: auto;
        scrollbar-width: thin;
      }

      .verify-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .verify-stat {
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface-muted);
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .verify-stat-value {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        font-variant-numeric: tabular-nums;
        line-height: 1.1;
      }

      .verify-stat-label {
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.02em;
      }

      .verify-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      /* --- State: success --- */
      .pane-success {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 18px 8px;
        color: var(--success);
      }

      .pane-success-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--success-soft);
        display: grid;
        place-items: center;
      }

      .pane-success-text {
        font-size: 12.5px;
        color: var(--text);
        text-align: center;
        line-height: 1.45;
      }

      /* --- State: processing (schedule-build progress) --- */
      .pane-progress {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px 10px 12px;
        text-align: center;
      }

      .pane-progress-spinner {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid var(--border, rgba(0, 0, 0, 0.12));
        border-top-color: var(--accent, #3b82f6);
        animation: pane-progress-spin 0.9s linear infinite;
      }

      @keyframes pane-progress-spin {
        to { transform: rotate(360deg); }
      }

      .pane-progress-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        line-height: 1.35;
      }

      .pane-progress-hint {
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.5;
        max-width: 280px;
      }

      /* --- State: error --- */
      .pane-error {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .pane-error-msg {
        padding: 10px 12px;
        border: 1px solid var(--error);
        border-left-width: 3px;
        border-radius: var(--radius);
        background: var(--error-soft);
        color: var(--text);
        font-size: 12.5px;
        line-height: 1.5;
      }

      /* ======================================================
         Buttons
         ====================================================== */
      .btn {
        font-family: inherit;
        font-size: 12px;
        font-weight: 500;
        padding: 7px 14px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: background 160ms var(--ease), border-color 160ms var(--ease),
          color 160ms var(--ease), transform 120ms var(--ease);
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-secondary);
      }

      .btn-ghost:hover {
        background: var(--surface-muted);
        color: var(--text);
      }

      .btn-danger-ghost {
        background: transparent;
        color: var(--error);
        border-color: var(--border);
      }

      .btn-danger-ghost:hover {
        background: var(--error-soft);
        border-color: var(--error);
      }

      /* ======================================================
         4. FILES BLOCK — utility, bottom, low visual weight
         ====================================================== */
      .files-block {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .files-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 0 0 0 2px;
      }

      .files-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .file-slot {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .file-dropzone {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--surface);
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius);
        cursor: pointer;
        transition: border-color 160ms var(--ease), background 160ms var(--ease);
        min-height: 46px;
      }

      .file-dropzone:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .file-dropzone.dragover {
        border-color: var(--accent);
        border-style: solid;
        background: var(--accent-soft);
      }

      .file-dropzone-icon {
        flex-shrink: 0;
        color: var(--text-muted);
      }

      .file-dropzone-text {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .file-dropzone-label {
        font-size: 11.5px;
        color: var(--text);
        font-weight: 500;
        line-height: 1.2;
      }

      .file-dropzone-hint {
        font-size: 10px;
        color: var(--text-muted);
        line-height: 1.2;
      }

      .file-input {
        display: none;
      }

      .file-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .file-list:empty {
        display: none;
      }

      .file-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 11px;
        animation: fade-up 180ms var(--ease);
      }

      .file-chip-tag {
        flex-shrink: 0;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 1px 5px;
        border-radius: 3px;
        background: var(--surface-muted);
        color: var(--text-secondary);
        text-transform: uppercase;
      }

      .file-chip-tag.pdf {
        background: var(--error-soft);
        color: var(--error);
      }

      .file-chip-tag.txt {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .file-chip-name {
        flex: 1;
        min-width: 0;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-chip-status {
        flex-shrink: 0;
        font-size: 10px;
        color: var(--text-muted);
      }

      .file-chip-status.done {
        color: var(--success);
      }
      .file-chip-status.error {
        color: var(--error);
      }

      .file-chip-remove {
        flex-shrink: 0;
        width: 18px;
        height: 18px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        display: grid;
        place-items: center;
        border-radius: 3px;
        padding: 0;
      }

      .file-chip-remove:hover {
        background: var(--error-soft);
        color: var(--error);
      }

      .file-fallback {
        padding: 8px 10px;
        background: var(--warning-soft);
        border: 1px solid var(--warning);
        border-radius: var(--radius);
        font-size: 11px;
        color: var(--text);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .file-fallback-actions {
        display: flex;
        gap: 6px;
      }

      .file-fallback .btn {
        padding: 4px 10px;
        font-size: 11px;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- 1. HEADER -->
      <header class="header" role="banner">
        <div class="header-main">
          <div id="headerPatient" class="header-patient">
            <span class="placeholder">Пациент не выбран</span>
          </div>
          <div id="headerContext" class="header-context">
            <span class="header-context-doc">Готов к команде</span>
          </div>
        </div>
        <div id="headerStatus" class="header-status" data-state="idle" role="status">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="statusLabel">Готов</span>
        </div>
      </header>

      <!-- 2. COMMAND BLOCK — mic + text, one row -->
      <div class="command-block" id="commandBlock" data-state="idle">
        <button
          type="button"
          id="record"
          aria-pressed="false"
          aria-label="Активировать ассистента"
        >
          <svg class="icon icon-mic" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z"
              stroke="currentColor"
              stroke-width="1.75"
            />
            <path
              d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v3M8 21h8"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            />
          </svg>
          <svg class="icon icon-wave" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M4 12h2l1.5-4L10 16l2-8 2.5 6L16 8h2l2 4"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <svg class="icon icon-spin" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 3a9 9 0 1 0 9 9"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <div class="command-input-wrap">
          <input
            id="utter"
            type="text"
            autocomplete="off"
            placeholder="Команда голосом или текстом…"
            aria-label="Текстовая команда"
          />
          <span class="command-hint" aria-hidden="true">
            <span class="kbd">↵</span>
          </span>
        </div>
      </div>

      <!-- 3. MAIN PANE — state-driven (idle / processing / verify / success / error) -->
      <section
        id="mainPane"
        class="main-pane"
        data-state="idle"
        aria-live="polite"
        aria-label="Рабочая область"
      >
        <header class="pane-header">
          <h2 id="paneTitle" class="pane-title">Готов к команде</h2>
          <span id="paneMeta" class="pane-meta"></span>
        </header>
        <div id="paneBody" class="pane-body">
          <!-- Content rendered dynamically based on data-state on #mainPane -->
        </div>
      </section>

      <!-- 4. FILES BLOCK — utility, minimal -->
      <section class="files-block" aria-label="Файлы">
        <h3 class="files-title">Файлы</h3>
        <div class="files-row">
          <div class="file-slot">
            <div
              id="patientUploadDropzone"
              class="file-dropzone"
              role="button"
              tabindex="0"
              aria-label="Загрузить PDF пациента"
            >
              <svg class="file-dropzone-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 16V4m0 0L8 8m4-4l4 4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <div class="file-dropzone-text">
                <span class="file-dropzone-label">PDF пациента</span>
                <span class="file-dropzone-hint">до 5 МБ</span>
              </div>
            </div>
            <input type="file" id="patientUploadFileInput" class="file-input" accept=".pdf,.txt,.text,application/pdf,text/plain" multiple />
            <div id="patientUploadFileList" class="file-list"></div>
            <div id="patientUploadFallback" class="file-fallback hidden" aria-live="polite">
              <span>Пациент не определён.</span>
              <div class="file-fallback-actions">
                <button type="button" id="btnOpenPatient" class="btn btn-primary">Открыть профиль</button>
                <button type="button" id="btnUploadAsTemplate" class="btn btn-ghost">Как шаблон</button>
              </div>
            </div>
          </div>
          <div class="file-slot">
            <div
              id="reusableUploadDropzone"
              class="file-dropzone"
              role="button"
              tabindex="0"
              aria-label="Загрузить шаблон"
            >
              <svg class="file-dropzone-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M9 7V4h10v14h-3M4 9h10v11H4z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <div class="file-dropzone-text">
                <span class="file-dropzone-label">Шаблоны</span>
                <span class="file-dropzone-hint">PDF, TXT</span>
              </div>
            </div>
            <input type="file" id="reusableUploadFileInput" class="file-input" accept=".pdf,.txt,.text,application/pdf,text/plain" multiple />
            <div id="reusableUploadFileList" class="file-list"></div>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="../dist/sidepanel.js"></script>
  </body>
</html>
