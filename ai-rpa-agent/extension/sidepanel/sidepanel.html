<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Акбобек AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3a;
        --accent: #4f8ef7;
        --accent-hover: #6b9ef9;
        --accent-active: #3b7ae0;
        --success: #34d399;
        --warning: #fbbf24;
        --error: #f87171;
        --text: #f1f5f9;
        --text-secondary: #94a3b8;
        --radius-lg: 8px;
        --radius-xl: 12px;
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
        --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        min-width: 320px;
        max-width: 400px;
        width: 100%;
        margin: 0 auto;
      }

      .app {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        padding: 14px 14px 16px;
        gap: 14px;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-card);
      }

      .header-logo {
        flex-shrink: 0;
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        background: rgba(79, 142, 247, 0.12);
        border-radius: var(--radius-lg);
        color: var(--accent);
      }

      .header-text {
        flex: 1;
        min-width: 0;
      }

      .header-title {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text);
      }

      .header-sub {
        margin: 2px 0 0;
        font-size: 11px;
        color: var(--text-secondary);
        font-weight: 400;
      }

      .header-status {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--success);
        box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.45);
        transition: background 200ms var(--ease), box-shadow 200ms var(--ease);
      }

      .status-dot.ready {
        animation: pulse-green 2s var(--ease) infinite;
      }

      .status-dot.processing {
        background: var(--warning);
        animation: pulse-yellow 1.2s var(--ease) infinite;
      }

      @keyframes pulse-green {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.35);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(52, 211, 153, 0);
        }
      }

      @keyframes pulse-yellow {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4);
        }
        50% {
          box-shadow: 0 0 0 7px rgba(251, 191, 36, 0);
        }
      }

      .status-label {
        font-size: 10px;
        font-weight: 500;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        max-width: 72px;
        text-align: right;
      }

      /* Voice section */
      .section-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-secondary);
        margin: 0 0 8px 2px;
      }

      .voice-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 18px 16px 16px;
        box-shadow: var(--shadow-card);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .ptt-wrap {
        position: relative;
        width: 72px;
        height: 72px;
        display: grid;
        place-items: center;
      }

      .ptt-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        pointer-events: none;
        transition: border-color 200ms var(--ease), transform 200ms var(--ease);
      }

      #record.is-listening .ptt-ring {
        border-color: var(--success);
        animation: ring-pulse 1.3s var(--ease) infinite;
      }

      #record.is-processing .ptt-ring {
        border-color: var(--accent);
        animation: ring-pulse 1s var(--ease) infinite;
      }

      @keyframes ring-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.08);
          opacity: 0.65;
        }
      }

      #record {
        position: relative;
        z-index: 1;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: none;
        padding: 0;
        cursor: pointer;
        background: linear-gradient(145deg, #4b5160 0%, #363a47 100%);
        color: #fff;
        display: grid;
        place-items: center;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
        transition: transform 200ms var(--ease), box-shadow 200ms var(--ease), background 200ms var(--ease),
          filter 200ms var(--ease);
      }

      #record.is-listening {
        background: linear-gradient(145deg, var(--success) 0%, #20a37a 100%);
        box-shadow: 0 4px 18px rgba(52, 211, 153, 0.45);
        animation: btn-breathe 1.8s var(--ease) infinite;
      }

      #record.is-processing {
        background: linear-gradient(145deg, var(--accent) 0%, #3d7de8 100%);
        box-shadow: 0 4px 18px rgba(79, 142, 247, 0.45);
      }

      @keyframes btn-breathe {
        0%,
        100% {
          filter: brightness(1);
        }
        50% {
          filter: brightness(1.12);
        }
      }

      #record:hover {
        transform: scale(1.03);
        filter: brightness(1.05);
      }

      #record:active {
        transform: scale(0.97);
        filter: brightness(0.95);
      }

      #record:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      #record:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      #record .icon-mic,
      #record .icon-wave,
      #record .icon-spin {
        position: absolute;
        transition: opacity 200ms var(--ease), transform 200ms var(--ease);
      }

      #record .icon-wave,
      #record .icon-spin {
        opacity: 0;
        transform: scale(0.85);
      }

      #record.is-listening .icon-mic,
      #record.is-processing .icon-mic {
        opacity: 0;
        transform: scale(0.85);
      }

      #record.is-listening .icon-wave {
        opacity: 1;
        transform: scale(1);
      }

      #record.is-processing .icon-spin {
        opacity: 1;
        transform: scale(1);
        animation: icon-spin 0.9s linear infinite;
      }

      @keyframes icon-spin {
        to {
          transform: scale(1) rotate(360deg);
        }
      }

      .ptt-caption {
        margin-top: 12px;
        font-size: 12px;
        color: var(--text-secondary);
        text-align: center;
        min-height: 1.4em;
        transition: color 200ms var(--ease);
      }

      .ptt-caption.recording {
        color: var(--success);
        font-weight: 500;
      }

      .ptt-caption.processing {
        color: var(--accent);
        font-weight: 500;
      }

      /* Waveform */
      .waveform {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 3px;
        height: 28px;
        margin-top: 14px;
        width: 100%;
        max-width: 220px;
        opacity: 0.35;
        transition: opacity 200ms var(--ease);
      }

      .waveform.active {
        opacity: 1;
      }

      .waveform span {
        width: 3px;
        border-radius: 2px;
        background: var(--accent);
        height: 6px;
        transition: height 120ms var(--ease);
      }

      .waveform.active span {
        animation: wave 0.9s var(--ease) infinite;
      }

      .waveform.active span:nth-child(1) {
        animation-delay: 0ms;
      }
      .waveform.active span:nth-child(2) {
        animation-delay: 0.08s;
      }
      .waveform.active span:nth-child(3) {
        animation-delay: 0.16s;
      }
      .waveform.active span:nth-child(4) {
        animation-delay: 0.24s;
      }
      .waveform.active span:nth-child(5) {
        animation-delay: 0.32s;
      }
      .waveform.active span:nth-child(6) {
        animation-delay: 0.4s;
      }
      .waveform.active span:nth-child(7) {
        animation-delay: 0.48s;
      }
      .waveform.active span:nth-child(8) {
        animation-delay: 0.56s;
      }
      .waveform.active span:nth-child(9) {
        animation-delay: 0.64s;
      }

      @keyframes wave {
        0%,
        100% {
          height: 6px;
        }
        50% {
          height: 22px;
        }
      }

      /* Text input */
      .text-fallback {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 12px;
        box-shadow: var(--shadow-card);
      }

      .input-row {
        display: flex;
        align-items: stretch;
        gap: 0;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease);
      }

      .input-row:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.22);
      }

      #utter {
        flex: 1;
        border: none;
        background: transparent;
        color: var(--text);
        font: inherit;
        padding: 10px 12px;
        min-width: 0;
        outline: none;
      }

      #utter::placeholder {
        color: var(--text-secondary);
        opacity: 0.85;
      }

      #send {
        flex-shrink: 0;
        width: 40px;
        border: none;
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: background 200ms var(--ease), color 200ms var(--ease);
      }

      #send:hover {
        background: rgba(79, 142, 247, 0.12);
        color: var(--accent-hover);
      }

      #send:active {
        background: rgba(79, 142, 247, 0.2);
        color: var(--accent-active);
      }

      #send:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
      }

      /* Confidence */
      .confidence-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-card);
        transition: opacity 200ms var(--ease);
      }

      .confidence-bar.hidden {
        display: none;
      }

      .badge-intent {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 4px 8px;
        border-radius: 6px;
        background: rgba(79, 142, 247, 0.15);
        color: var(--accent);
        border: 1px solid rgba(79, 142, 247, 0.35);
      }

      .confidence-meta {
        display: flex;
        align-items: baseline;
        gap: 6px;
        margin-left: auto;
      }

      #confidencePercent {
        font-size: 16px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      #confidencePercent.level-high {
        color: var(--success);
      }

      #confidencePercent.level-mid {
        color: var(--warning);
      }

      #confidencePercent.level-low {
        color: var(--error);
      }

      .confidence-word {
        font-size: 11px;
        color: var(--text-secondary);
      }

      /* Proactive card */
      .proactive-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        border-left: 4px solid var(--accent);
        padding: 12px 12px 12px 14px;
        box-shadow: var(--shadow-card);
      }

      .proactive-card.hidden {
        display: none;
      }

      .proactive-inner {
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }

      .proactive-icon {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border-radius: var(--radius-lg);
        background: rgba(52, 211, 153, 0.12);
        color: var(--success);
        display: grid;
        place-items: center;
        font-size: 14px;
      }

      .proactive-icon.confirm {
        background: rgba(251, 191, 36, 0.12);
        color: var(--warning);
      }

      #proactiveText {
        margin: 0;
        font-size: 12px;
        line-height: 1.5;
        color: var(--text);
      }

      .proactive-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        justify-content: flex-end;
      }

      .btn {
        font-family: inherit;
        font-size: 12px;
        font-weight: 500;
        padding: 8px 14px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: background 200ms var(--ease), border-color 200ms var(--ease), color 200ms var(--ease),
          transform 200ms var(--ease);
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }

      .btn-primary:active {
        background: var(--accent-active);
        border-color: var(--accent-active);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-secondary);
      }

      .btn-ghost:hover {
        background: rgba(148, 163, 184, 0.08);
        color: var(--text);
        border-color: var(--border);
      }

      .btn-ghost:active {
        background: rgba(148, 163, 184, 0.14);
      }

      /* Timeline */
      .timeline-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .timeline-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .timeline-header .section-label {
        margin: 0;
      }

      #timeline {
        flex: 1;
        min-height: 120px;
        max-height: min(40vh, 320px);
        overflow-y: auto;
        padding: 4px 2px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      #timeline::-webkit-scrollbar {
        width: 6px;
      }

      #timeline::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .timeline-item {
        display: grid;
        grid-template-columns: 10px 1fr;
        gap: 10px;
        align-items: start;
        padding: 8px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        animation: fade-in 200ms var(--ease);
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .timeline-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-top: 4px;
      }

      .timeline-dot.success {
        background: var(--success);
      }
      .timeline-dot.info {
        background: var(--accent);
      }
      .timeline-dot.warning {
        background: var(--warning);
      }
      .timeline-dot.error {
        background: var(--error);
      }

      .timeline-body {
        min-width: 0;
      }

      .timeline-type {
        font-size: 11px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: 0.02em;
      }

      .timeline-time {
        font-size: 10px;
        color: var(--text-secondary);
        margin-top: 2px;
      }

      .timeline-desc {
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 4px;
        line-height: 1.4;
        word-break: break-word;
      }

      .timeline-empty {
        flex: 1;
        min-height: 140px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text-secondary);
        font-size: 12px;
        text-align: center;
        padding: 20px;
        border: 1px dashed var(--border);
        border-radius: var(--radius-xl);
        background: rgba(26, 29, 39, 0.5);
      }

      .timeline-empty.hidden {
        display: none;
      }

      .timeline-empty svg {
        opacity: 0.45;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header" role="banner">
        <div class="header-logo" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M4 12h2l1.5-4L10 16l2-8 2.5 6L16 8h2l2 4"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div class="header-text">
          <h1 class="header-title">Акбобек AI</h1>
          <p class="header-sub">Медицинский ассистент</p>
        </div>
        <div class="header-status">
          <span id="statusDot" class="status-dot ready" aria-hidden="true"></span>
          <span id="statusLabel" class="status-label">Готов</span>
        </div>
      </header>

      <section class="voice-section" aria-labelledby="voice-heading">
        <h2 id="voice-heading" class="section-label">Голос</h2>
        <div class="voice-card">
          <div class="ptt-wrap">
            <div class="ptt-ring" aria-hidden="true"></div>
            <button
              type="button"
              id="record"
              class="is-inactive"
              aria-pressed="false"
              aria-label="Активировать или деактивировать ассистента"
            >
              <svg class="icon-mic" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z"
                  stroke="currentColor"
                  stroke-width="1.75"
                />
                <path
                  d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v3M8 21h8"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                />
              </svg>
              <svg class="icon-wave" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M4 12h2l1.5-4L10 16l2-8 2.5 6L16 8h2l2 4"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg class="icon-spin" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 3a9 9 0 1 0 9 9"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
          <p id="pttLabel" class="ptt-caption">Активировать ассистента</p>
          <div id="waveform" class="waveform" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span
            ><span></span><span></span>
          </div>
        </div>
      </section>

      <section class="text-fallback" aria-labelledby="text-heading">
        <h2 id="text-heading" class="section-label">Текст</h2>
        <div class="input-row">
          <input id="utter" type="text" autocomplete="off" placeholder="или введите команду…" />
          <button type="button" id="send" aria-label="Отправить">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M5 12h11M13 6l6 6-6 6"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </section>

      <section
        id="confidenceBar"
        class="confidence-bar hidden"
        aria-live="polite"
        aria-label="Оценка уверенности"
      >
        <span id="confidenceBadge" class="badge-intent">—</span>
        <div class="confidence-meta">
          <span id="confidencePercent" class="level-high">—</span>
          <span class="confidence-word">уверенность</span>
        </div>
      </section>

      <section id="proactiveCard" class="proactive-card hidden" aria-live="polite">
        <div class="proactive-inner">
          <div id="proactiveIcon" class="proactive-icon" aria-hidden="true">✓</div>
          <p id="proactiveText"></p>
        </div>
        <div class="proactive-actions">
          <button type="button" id="accept" class="btn btn-primary">Да</button>
          <button type="button" id="reject" class="btn btn-ghost">Пропустить</button>
        </div>
      </section>

      <section class="timeline-section" aria-labelledby="timeline-heading">
        <div class="timeline-header">
          <h2 id="timeline-heading" class="section-label">События</h2>
        </div>
        <div id="timeline" role="log" aria-relevant="additions"></div>
        <div id="timelineEmpty" class="timeline-empty">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 8v5l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
              stroke="currentColor"
              stroke-width="1.25"
              stroke-linecap="round"
